kind: pipeline
name: default

steps:
  - name: test
    image: golang:1.21-alpine
    commands:
      - go test -v ./...

  - name: build
    image: golang:1.21-alpine
    commands:
      - go build -o app .
    when:
      event:
        - push
        - pull_request

trigger:
  branch:
    - main
    - master
  event:
    - push
    - pull_request
