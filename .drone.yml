kind: pipeline
type: docker
name: default

steps:
  - name: test
    image: golang:1.21-alpine
    commands:
      - go test -v ./...

  - name: build-and-push-image
    image: docker:27-cli
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
    environment:
      REGISTRY: 10.1.0.17:5000
      IMAGE_NAME: dronetest
    commands:
      - IMAGE=$REGISTRY/$IMAGE_NAME
      - TAG=${DRONE_BUILD_NUMBER}
      - docker build -t $IMAGE:$TAG .
      - docker tag $IMAGE:$TAG $IMAGE:latest
      - docker push $IMAGE:$TAG
      - docker push $IMAGE:latest

  - name: deploy
    image: docker:27-cli
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
    environment:
      REGISTRY: 10.1.0.17:5000
      IMAGE_NAME: dronetest
    when:
      branch:
        - main
        - master
      event:
        - push
    commands:
      - IMAGE=$REGISTRY/$IMAGE_NAME
      - TAG=${DRONE_BUILD_NUMBER}
      - docker pull $IMAGE:$TAG
      - docker stop dronetest || true
      - docker rm dronetest || true
      - docker run -d --name dronetest -p 8080:8080 $IMAGE:$TAG

trigger:
  branch:
    - main
    - master
  event:
    - push
    - pull_request

volumes:
  - name: dockersock
    host:
      path: /var/run/docker.sock
