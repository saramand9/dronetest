kind: pipeline
type: docker
name: default

steps:
  - name: test
    image: golang:1.21-alpine
    commands:
      - go test -v ./...

  - name: build-and-push-image
    image: docker:27-cli
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
    environment:
      REGISTRY: 10.1.0.17:5000
      IMAGE_NAME: dronetest
    commands:
      - IMAGE=$REGISTRY/$IMAGE_NAME
      - TAG=${DRONE_BUILD_NUMBER}
      - docker build -t $IMAGE:$TAG .
      - docker tag $IMAGE:$TAG $IMAGE:latest
      - docker push $IMAGE:$TAG
      - docker push $IMAGE:latest

  - name: deploy
    image: docker:27-cli
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
    environment:
      REGISTRY: 10.1.0.17:5000
      IMAGE_NAME: dronetest
    when:
      branch:
        - main
        - master
      event:
        - push
    commands:
      - IMAGE=$REGISTRY/$IMAGE_NAME
      - TAG=${DRONE_BUILD_NUMBER}
      - docker pull $IMAGE:$TAG
      - docker stop dronetest || true
      - docker rm dronetest || true
      - docker run -d --name dronetest -p 8080:8080 $IMAGE:$TAG

  - name: notify-wechat
    image: curlimages/curl:8.7.1
    when:
      status:
        - success
        - failure
    commands:
      - |
        if [ "$DRONE_BUILD_STATUS" = "success" ]; then
          MSG="✅ 构建成功
> 仓库：$DRONE_REPO_NAMESPACE/$DRONE_REPO_NAME
> 分支：$DRONE_COMMIT_BRANCH
> 构建号：#$DRONE_BUILD_NUMBER";
        else
          MSG="❌ 构建失败
> 仓库：$DRONE_REPO_NAMESPACE/$DRONE_REPO_NAME
> 分支：$DRONE_COMMIT_BRANCH
> 构建号：#$DRONE_BUILD_NUMBER";
        fi
        curl -sS "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=d5c0d7bc-2e89-4061-819a-41bd2a21410a" \
          -H 'Content-Type: application/json' \
          -d "{
            \"msgtype\": \"markdown\",
            \"markdown\": {
              \"content\": \"${MSG}\"
            }
          }"

trigger:
  branch:
    - main
    - master
  event:
    - push
    - pull_request

volumes:
  - name: dockersock
    host:
      path: /var/run/docker.sock
